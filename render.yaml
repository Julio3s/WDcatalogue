databases:
  - name: world-design-db
    databaseName: world_design_db
    user: world_design_db_user
    plan: free
    version: 18

services:
  - type: web
    name: world-design-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    preDeployCommand: "python manage.py migrate --noinput"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: world-design-backend.onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://world-design-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: CSRF_TRUSTED_ORIGINS
        value: https://world-design-backend.onrender.com,https://world-design-frontend.onrender.com,http://localhost:5173,http://127.0.0.1:5173
      - key: CLOUDINARY_CLOUD_NAME
        value: demo-cloudinary-cloud-name
      - key: CLOUDINARY_API_KEY
        value: demo-cloudinary-api-key
      - key: CLOUDINARY_API_SECRET
        value: demo-cloudinary-api-secret
      - key: DB_ENGINE
        value: postgres
      - key: DB_NAME
        fromDatabase:
          name: world-design-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: world-design-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: world-design-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: world-design-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: world-design-db
          property: port
      - key: SITE_URL
        value: https://world-design-frontend.onrender.com

  - type: static
    name: world-design-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://world-design-backend.onrender.com/api
      - key: VITE_WHATSAPP_NUMBER
        value: 22892455800
