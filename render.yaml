databases:
  - name: world-design-db
    databaseName: world_design
    user: world_design
    plan: free

services:
  - type: web
    name: world-design-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: worl-design.onrender.com,worlddesign-shop.com,www.worlddesign-shop.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://worlddesign-shop.com,https://www.worlddesign-shop.com,https://worl-design-frontend.onrender.com,http://localhost:5173
      - key: CSRF_TRUSTED_ORIGINS
        value: https://worl-design.onrender.com,https://worlddesign-shop.com,https://www.worlddesign-shop.com,https://worl-design-frontend.onrender.com,http://localhost:5173
      - key: CLOUDINARY_CLOUD_NAME
        value: demo-cloudinary-cloud-name
      - key: CLOUDINARY_API_KEY
        value: demo-cloudinary-api-key
      - key: CLOUDINARY_API_SECRET
        value: demo-cloudinary-api-secret
      - key: DB_ENGINE
        value: postgres
      - key: DB_NAME
        fromDatabase:
          name: world-design-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: world-design-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: world-design-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: world-design-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: world-design-db
          property: port
      - key: SITE_URL
        value: https://worlddesign-shop.com
      - key: FEDAPAY_API_BASE_URL
        value: https://api.fedapay.com/v1
      - key: FEDAPAY_RETURN_URL
        value: https://worlddesign-shop.com/order-success

  - type: static
    name: world-design-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://worl-design.onrender.com/api
      - key: VITE_GOOGLE_MAPS_API_KEY
        value: demo-google-maps-api-key
